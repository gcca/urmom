app = 'urmom'
primary_region = 'ord'

[build]
  image = 'ghcr.io/gcca/urmom:latest'

[env]
  DB_URL = '/app/data/urmom.db'
  PORT = '50051'
  TZ = 'UTC'

[[mounts]]
  source = 'urmom_data'
  destination = '/app/data'

[http_service]
  internal_port = 50051
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

  [http_service.http_options]
    h2_backend = true

  [http_service.tls_options]
    alpn = ['h2']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
