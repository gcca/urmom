syntax = "proto3";

package auth;

option go_package = "github.com/gcca/urmom/clients/go/auth;auth";

service AuthService {
  rpc UserDetails(UserDetailsRequest) returns (UserDetailsResponse);
}

message UserDetailsRequest {
  string username = 1;
}

message UserDetailsResponse {
  bool is_active = 1;
  repeated string apps = 2;
}
