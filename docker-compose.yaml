services:
  urmom:
    build:
      context: .
      dockerfile: Dockerfile
      target: execute
    image: urmom:latest
    environment:
      TZ: UTC
      DB_URL: /app/data/urmom.db
      PORT: "50051"
      LOAD_SAMPLE_DATA: "1"
    ports:
      - "50051:50051"
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:
